<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whale Log Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Segoe UI', Roboto, sans-serif;
      background: #F5EFE3;
      color: #1a2332;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    .wrap {
      max-width: 480px;
      width: 100%;
      background: #FFFDF9;
      border: 1px solid rgba(160,140,110,0.22);
      border-radius: 16px;
      padding: 28px 24px;
      text-align: center;
    }
    h1 {
      font-size: 22px;
      color: #2AAFC6;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .sub {
      font-size: 13px;
      color: #6b6355;
      margin-bottom: 22px;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    a.link {
      display: block;
      padding: 14px 16px;
      background: rgba(42,175,198,0.08);
      border: 1px solid rgba(42,175,198,0.25);
      border-radius: 10px;
      color: #1a2332;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.15s;
    }
    a.link:active { background: rgba(42,175,198,0.16); }
    a.link .arrow {
      float: right;
      color: #2AAFC6;
    }
    footer {
      margin-top: 22px;
      font-size: 12px;
      color: #A09880;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>🐋 Whale Log</h1>
    <p class="sub">서비스 정책 안내</p>
    <nav class="links">
      <a class="link" href="./privacy.html">개인정보처리방침 <span class="arrow">→</span></a>
      <a class="link" href="./terms.html">이용약관 <span class="arrow">→</span></a>
    </nav>
    <footer>© 2026 Whale Log</footer>
  </main>
</body>
</html>
